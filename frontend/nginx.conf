server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large video uploads (up to 2 GB)
    client_max_body_size 2048m;

    # Serve the React SPA — all unknown routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → backend container (strips the /api prefix)
    # Matches vite.config.js dev proxy behaviour exactly
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeouts for video uploads
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 60s;

        # Disable buffering so upload progress works correctly
        proxy_request_buffering off;
    }
}
